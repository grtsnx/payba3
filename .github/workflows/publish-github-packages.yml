name: Publish GitHub Package

on:
  workflow_dispatch:

concurrency:
  group: publish-github-package-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  BUN_VERSION: latest

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@grtsnx"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Provider contract tests
        run: bun run test:providers

      - name: E2E tests
        run: bun run test:e2e

      - name: Build
        run: bun run build

      - name: Package dry run
        run: bun run pack:dry

      - name: Package install smoke / npm
        run: bun run test:package

      - name: Package install smoke / Bun
        run: bun run test:package:bun

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
